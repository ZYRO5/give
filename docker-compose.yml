version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: donor_db
    environment:
      POSTGRES_USER: donor_user
      POSTGRES_PASSWORD: donor_password
      POSTGRES_DB: donor_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: donor_redis
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: donor_backend
    environment:
      DATABASE_URL: postgresql://donor_user:donor_password@postgres:5432/donor_db
      REDIS_URL: redis://redis:6379
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-here}
      DEBUG: ${DEBUG:-False}
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: donor_frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://backend:8000/api/v1
    depends_on:
      - backend

volumes:
  postgres_data:
